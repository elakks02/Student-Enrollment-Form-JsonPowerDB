<!DOCTYPE html>
<html>
<head>
    <title>Student Enrollment Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center">Student Enrollment Form</h2>

    <div class="mb-3">
        <label>Roll No</label>
        <input type="text" id="rollNo" class="form-control">
    </div>

    <div class="mb-3">
        <label>Full Name</label>
        <input type="text" id="fullName" class="form-control">
    </div>

    <div class="mb-3">
        <label>Class</label>
        <input type="text" id="studentClass" class="form-control">
    </div>

    <div class="mb-3">
        <label>Birth Date</label>
        <input type="date" id="birthDate" class="form-control">
    </div>

    <div class="mb-3">
        <label>Address</label>
        <input type="text" id="address" class="form-control">
    </div>

    <div class="mb-3">
        <label>Enrollment Date</label>
        <input type="date" id="enrollDate" class="form-control">
    </div>

    <button id="saveBtn" class="btn btn-success">
        Save
    </button>

    <button id="updateBtn" class="btn btn-primary">
        Update
    </button>

    <button id="resetBtn" class="btn btn-danger">
        Reset
    </button>

</div>
<script src="script.js"></script>
</body>
</html>
